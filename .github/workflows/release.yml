name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      DERIVED_DATA_PATH: ${{ runner.temp }}/DerivedData
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.6"

      - name: Build
        run: |
          xcodebuild \
            -project Spoon.xcodeproj \
            -scheme Spoon \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            -skipMacroValidation \
            build

      - name: Package
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$DERIVED_DATA_PATH/Build/Products/Release/Spoon.app" \
            "Spoon-${TAG}-macOS.zip"

      - name: Publish release
        run: gh release create "$TAG" --title "$TAG" --generate-notes "Spoon-${TAG}-macOS.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
